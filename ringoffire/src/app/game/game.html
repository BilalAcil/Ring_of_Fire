<app-player *ngFor="let player of game.players; let i = index" [ngStyle]="{ top: 100 + (i * 100) + 'px' }"
  [name]="player" class="player-position"></app-player>
<div class="field">
  <div class="card-stack">
    <img [ngStyle]="{ right: i * 5 + 'px' }" *ngFor="let c of [0,1,2,3]; let i = index" src="/img/cards/card_cover.png"
      alt="">

    <img (click)="takeCard()" class="top-card" style="right: 25px;" src="/img/cards/card_cover.png">

    <img *ngFor="let card of game.playedCards" [src]="'/img/cards/' + card + '.png'" alt="" class="played-card">

    <img *ngIf="currentCard" #pickedCard class="picked-card" style="right: 25px;"
      [src]="'/img/cards/' + currentCard + '.png'" alt="">

  </div>
</div>


<button matFab (click)="openDialog()" class="btn-add">
  <mat-icon>add</mat-icon>
</button>
